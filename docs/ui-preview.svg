  <!-- Preview window -->
  <g filter="url(#shadowR)" transform="translate(468 64)">
    <rect width="840" height="668" rx="14" fill="#101418" fill-opacity="0.35" stroke="white" stroke-opacity="0.18"/>
    <rect width="840" height="44" rx="14" fill="white" fill-opacity="0.06"/>
    <rect y="30" width="840" height="14" fill="#101418" fill-opacity="0.35"/>
    <circle cx="22" cy="22" r="6" fill="#FF5F57"/>
    <circle cx="42" cy="22" r="6" fill="#FEBC2E"/>
    <circle cx="62" cy="22" r="6" fill="#28C840"/>
