      <text x="342" y="402" text-anchor="end" fill="white" fill-opacity="0.82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">6.5</text>
      <line x1="18" y1="414" x2="342" y2="414" stroke="white" stroke-opacity="0.18"/>
      <rect x="210" y="410" width="2" height="8" fill="white" fill-opacity="0.85"/>

      <text x="18" y="448" fill="white" fill-opacity="0.45" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" letter-spacing="1.5">DENSENESS</text>
      <text x="342" y="448" text-anchor="end" fill="white" fill-opacity="0.82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">1.05</text>
      <line x1="18" y1="460" x2="342" y2="460" stroke="white" stroke-opacity="0.18"/>
      <rect x="248" y="456" width="2" height="8" fill="white" fill-opacity="0.85"/>

      <text x="18" y="494" fill="white" fill-opacity="0.45" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" letter-spacing="1.5">ROUGHNESS</text>
      <text x="342" y="494" text-anchor="end" fill="white" fill-opacity="0.82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">0.85</text>
      <line x1="18" y1="506" x2="342" y2="506" stroke="white" stroke-opacity="0.18"/>
      <rect x="180" y="502" width="2" height="8" fill="white" fill-opacity="0.85"/>

