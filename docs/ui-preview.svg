    <rect y="44" width="360" height="52" fill="white" fill-opacity="0.04"/>
    <text x="18" y="66" fill="white" fill-opacity="0.88" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="2">CMGEN // 0.1</text>
    <text x="342" y="66" text-anchor="end" fill="white" fill-opacity="0.38" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5">SEED 658179</text>

    <rect y="96" width="360" height="36" fill="white" fill-opacity="0.04"/>
