    </clipPath>
    <clipPath id="controlsScroll">
      <rect x="0" y="132" width="360" height="548" rx="0"/>
    </clipPath>
  </defs>

  <rect width="1400" height="860" rx="18" fill="url(#desk)"/>
  <rect width="1400" height="860" rx="18" fill="url(#glow)"/>

