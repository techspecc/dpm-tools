<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1400" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101820"/>
      <stop offset="0.45" stop-color="#1a2430"/>
      <stop offset="1" stop-color="#121c16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 280) rotate(90) scale(520 680)">
      <stop stop-color="#2a3d52" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2a3d52" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadowL" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="shadowR" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#000000" flood-opacity="0.62"/>
    </filter>
    <clipPath id="previewInner">
