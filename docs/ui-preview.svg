      <text x="342" y="540" text-anchor="end" fill="white" fill-opacity="0.82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">192</text>
      <line x1="18" y1="552" x2="342" y2="552" stroke="white" stroke-opacity="0.18"/>
